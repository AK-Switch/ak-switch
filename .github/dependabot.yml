# Dependabot 版本更新配置
# 详见: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "enhancement"
    open-pull-requests-limit: 5
