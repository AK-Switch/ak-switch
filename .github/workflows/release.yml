name: Build & Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.4.0)'
        required: true
        type: string
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            suffix: linux-arm
          - goos: linux
            goarch: "386"
            suffix: linux-386
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # Windows 构建时嵌入 exe 图标
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go install github.com/akavel/rsrc@latest
            $(go env GOPATH)/bin/rsrc -ico assets/icon.ico -o cmd/akswitch/akswitch.syso
          fi
          go build -ldflags="-s -w -X akswitch/internal/cmd.Version=$VERSION" -o akswitch-${{ matrix.suffix }} ./cmd/akswitch/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akswitch-${{ matrix.suffix }}
          path: akswitch-${{ matrix.suffix }}
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
